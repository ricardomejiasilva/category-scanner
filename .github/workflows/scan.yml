name: Category Scanner

on:
  # Run every day at 8am UTC
  schedule:
    - cron: '0 8 * * *'
  # Also allow manual runs from GitHub UI
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scanner
        run: node scanner.js

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: scan-report-${{ github.run_id }}
          path: report.html
          retention-days: 30

      # Optional: Post to Slack if issues found
      # Uncomment and set SLACK_WEBHOOK secret in GitHub repo settings
